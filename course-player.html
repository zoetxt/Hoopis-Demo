<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Course Player · Hoopis Performance Network</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060d1f;--surface:#0e1829;--surface2:#111d31;
  --teal:#00c8d4;--teal2:rgba(0,200,212,.14);--teal3:rgba(0,200,212,.35);
  --green:#22c55e;--white:#fff;--muted:#8a9ec0;--border:#1a2d4a;
  --navy:#060d1f;--gold:#f5c518;
}
html,body{height:100%;background:var(--bg);color:var(--white);font-family:'Inter','Helvetica Neue',Arial,sans-serif;font-size:16px;overflow-x:hidden}
.page-wrap{max-width:80vw;margin:0 auto}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:68px;z-index:200;
  background:linear-gradient(180deg,rgba(6,13,31,.98) 0%,rgba(6,13,31,.7) 100%);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
  transition:background .3s;
}
.topbar-inner{display:flex;align-items:center;justify-content:space-between;height:68px}
.topbar.solid{background:var(--navy)}
.back-btn{
  display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--white);
  font-weight:600;font-size:16px;flex-shrink:0;
  opacity:.85;transition:opacity .2s;
}
.back-btn:hover{opacity:1}
.back-btn svg{width:20px;height:20px;stroke:var(--white);fill:none;stroke-width:2.5;flex-shrink:0}
.back-logo{height:28px;width:auto}
.topbar-title{
  position:absolute;left:50%;transform:translateX(-50%);
  font-size:16px;font-weight:600;color:var(--white);opacity:.9;
  max-width:500px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  pointer-events:none;
}
.topbar-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.prog-pill{
  display:flex;align-items:center;gap:8px;background:var(--surface2);
  border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:15px;font-weight:600;
}
.prog-pill-bar{width:72px;height:4px;background:rgba(255,255,255,.12);border-radius:2px;overflow:hidden}
.prog-pill-fill{height:4px;background:var(--green);border-radius:2px;transition:width .4s}
.prog-pill-pct{color:var(--green)}

/* ── LAYOUT ── */
.layout{
  padding-top:68px;min-height:100vh;
  max-width:80vw;margin:0 auto;
}

/* ── PLAYER ── */
.main-col{min-width:0}
.player-wrap{position:relative;width:100%;background:#000}
.player-container{
  position:relative;padding-bottom:56.25%;background:#000;overflow:hidden;cursor:pointer;
}
.player-container iframe,.player-container #yt-iframe{
  position:absolute;top:0;left:0;width:100%;height:100%;border:none;pointer-events:none;
}
.player-container.controls-visible iframe{pointer-events:none}

/* Controls overlay */
.controls-overlay{
  position:absolute;inset:0;z-index:3;display:flex;flex-direction:column;justify-content:flex-end;
  opacity:0;transition:opacity .25s;pointer-events:none;
}
.controls-overlay.visible{opacity:1;pointer-events:none}
.ctrl-content{pointer-events:auto}
.ctrl-grad{
  position:absolute;bottom:0;left:0;right:0;height:160px;pointer-events:none;
  background:linear-gradient(transparent,rgba(6,13,31,.92));
}
.ctrl-content{position:relative;z-index:2;padding:0 16px 14px}

/* Progress bar */
.progress-row{padding:0 0 8px}
.progress-track{
  position:relative;height:4px;background:rgba(255,255,255,.18);border-radius:2px;cursor:pointer;
  transition:height .15s;
}
.progress-track:hover{height:6px}
.progress-buffered{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.28);border-radius:2px;pointer-events:none}
.progress-fill{position:absolute;left:0;top:0;height:100%;background:var(--green);border-radius:2px;pointer-events:none;transition:width .2s linear}
.progress-thumb{
  position:absolute;top:50%;width:14px;height:14px;background:var(--white);border-radius:50%;
  transform:translate(-50%,-50%) scale(0);transition:transform .15s;pointer-events:none;
}
.progress-track:hover .progress-thumb{transform:translate(-50%,-50%) scale(1)}

/* Controls bottom row */
.ctrl-row{display:flex;align-items:center;gap:6px}
.ctrl-left{display:flex;align-items:center;gap:8px;flex:1}
.ctrl-center{flex:1;text-align:center;overflow:hidden}
.ctrl-right{display:flex;align-items:center;gap:8px;justify-content:flex-end;flex:1}
.ctrl-btn{
  width:34px;height:34px;border:none;background:transparent;color:var(--white);
  cursor:pointer;border-radius:6px;display:flex;align-items:center;justify-content:center;
  transition:background .15s,transform .1s;flex-shrink:0;
}
.ctrl-btn:hover{background:rgba(255,255,255,.12);transform:scale(1.08)}
.ctrl-btn svg{width:18px;height:18px;fill:currentColor;flex-shrink:0}
.ctrl-btn.play-btn svg{width:20px;height:20px}
.time-badge{font-size:12px;color:rgba(255,255,255,.85);font-weight:600;white-space:nowrap;font-variant-numeric:tabular-nums}
.lesson-name-ctrl{font-size:12px;color:rgba(255,255,255,.7);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Volume */
.vol-wrap{display:flex;align-items:center;gap:6px}
.vol-slider{
  -webkit-appearance:none;width:72px;height:3px;background:rgba(255,255,255,.25);
  border-radius:2px;outline:none;cursor:pointer;
}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--white);border-radius:50%}

/* Speed */
.speed-btn{
  font-size:11px;font-weight:700;color:var(--white);background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);border-radius:4px;padding:4px 8px;cursor:pointer;
  transition:background .15s;
}
.speed-btn:hover{background:rgba(255,255,255,.2)}
.speed-menu{
  position:absolute;bottom:52px;right:60px;background:#1a2d4a;border:1px solid var(--border);
  border-radius:8px;overflow:hidden;z-index:50;display:none;
}
.speed-menu.open{display:block}
.speed-opt{padding:8px 20px;font-size:13px;cursor:pointer;transition:background .12s;font-weight:600}
.speed-opt:hover{background:var(--teal2)}
.speed-opt.active{color:var(--teal)}

/* Buffering spinner */
.spinner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:52px;height:52px;display:none;z-index:8;pointer-events:none;
}
.spinner.show{display:block}
.spinner circle{fill:none;stroke:var(--teal);stroke-width:3;stroke-linecap:round;
  stroke-dasharray:110;animation:spin-dash 1.2s ease-in-out infinite}
@keyframes spin-dash{0%{stroke-dashoffset:110;transform-origin:center;transform:rotate(0)}
  100%{stroke-dashoffset:0;transform:rotate(360deg);transform-origin:center}}
.spinner-wrap{animation:spin-rot 1.4s linear infinite}
@keyframes spin-rot{to{transform:rotate(360deg)}}


/* Up Next card */
.upnext-card{
  position:absolute;bottom:80px;right:16px;width:240px;
  background:rgba(6,13,31,.95);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;z-index:20;transform:translateX(280px);transition:transform .35s cubic-bezier(.4,0,.2,1);
  pointer-events:all;
}
.upnext-card.show{transform:translateX(0)}
.upnext-hdr{padding:8px 12px;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.8px;text-transform:uppercase;display:flex;justify-content:space-between;align-items:center}
.upnext-dismiss{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1}
.upnext-dismiss:hover{color:var(--white)}
.upnext-thumb{position:relative;width:100%;padding-bottom:56.25%;background:#0e1829;overflow:hidden}
.upnext-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.upnext-countdown{position:absolute;bottom:6px;right:6px;background:var(--teal);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.upnext-body{padding:10px 12px}
.upnext-title{font-size:12px;font-weight:600;color:var(--white);line-height:1.4;margin-bottom:4px}
.upnext-dur{font-size:11px;color:var(--muted)}
.upnext-play{
  margin-top:8px;width:100%;padding:7px;background:var(--teal);border:none;border-radius:6px;
  color:#000;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;
}
.upnext-play:hover{background:#00e8ff}
.upnext-bar{height:3px;background:rgba(255,255,255,.12);position:relative}
.upnext-bar-fill{position:absolute;left:0;top:0;height:100%;background:var(--teal);transition:width .5s linear}

/* ── COURSE INFO PANEL ── */
.course-info{padding:24px 0 0}
.ci-row{display:flex;align-items:flex-start;gap:16px;margin-bottom:16px}
.ci-main{flex:1;min-width:0}
.ci-title{font-size:26px;font-weight:800;line-height:1.25;margin-bottom:8px}
.ci-instructor{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.ci-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--surface2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--white)}
.ci-expert-name{font-size:16px;font-weight:600}
.ci-expert-role{font-size:14px;color:var(--muted);margin-top:1px}
.ci-stats{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.ci-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.ci-stat-val{color:var(--white);font-weight:600}
.ci-prog-wrap{margin-bottom:14px}
.ci-prog-label{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:5px}
.ci-prog-label span:last-child{color:var(--green);font-weight:700}
.ci-prog-track{height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.ci-prog-fill{height:100%;background:var(--green);border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.ci-desc{font-size:16px;color:var(--muted);line-height:1.6;margin-bottom:14px}
.ci-desc-toggle{background:none;border:none;color:var(--teal);font-size:15px;font-weight:600;cursor:pointer;padding:0;margin-bottom:16px}
.ci-tags{display:flex;gap:7px;flex-wrap:wrap;padding-bottom:20px;border-bottom:1px solid var(--border);margin-bottom:0}
.ci-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:var(--teal2);color:var(--teal);border:1px solid var(--teal3)}

/* ── RECOMMENDED ── */

/* ── LESSON CARDS GRID ── */
.lesson-cards-section{padding:32px 0 8px}
.lesson-cards-hdr{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.lesson-cards-title{font-size:22px;font-weight:700}
.lesson-cards-meta{font-size:14px;color:var(--muted)}
.lesson-cards-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.lc-card{
  background:var(--surface);border:2px solid var(--border);border-radius:12px;
  cursor:pointer;padding:20px 18px 16px;min-height:160px;
  display:flex;flex-direction:column;justify-content:space-between;
  transition:border-color .2s,transform .18s,box-shadow .18s,background .2s;
}
.lc-card:hover{border-color:var(--teal);transform:translateY(-3px);box-shadow:0 10px 32px rgba(0,0,0,.5);background:var(--surface2)}
.lc-card.active{border-color:var(--teal);background:rgba(0,200,212,.06);box-shadow:0 0 0 1px var(--teal)}
.lc-card.completed{border-color:var(--green);background:rgba(34,197,94,.04)}
/* large ghost chapter number at the top */
.lc-chap-num{
  font-size:36px;font-weight:900;line-height:1;letter-spacing:-1px;
  color:rgba(255,255,255,.1);margin-bottom:10px;font-variant-numeric:tabular-nums;
}
.lc-card.active   .lc-chap-num{color:rgba(0,200,212,.35)}
.lc-card.completed .lc-chap-num{color:rgba(34,197,94,.35)}
/* title */
.lc-title{
  font-size:14px;font-weight:600;line-height:1.45;color:var(--white);flex:1;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
  margin-bottom:12px;
}
/* footer row: duration left, badge right */
.lc-footer{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:auto}
.lc-dur{font-size:12px;color:var(--muted);font-weight:500}
.lc-now-badge{
  font-size:10px;font-weight:800;letter-spacing:.7px;text-transform:uppercase;
  color:var(--teal);display:none;white-space:nowrap;
}
.lc-card.active .lc-now-badge{display:block}
/* completed checkmark pill */
.lc-done-badge{
  font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
  color:var(--green);display:none;
}
.lc-card.completed .lc-done-badge{display:block}

/* ── FADE IN ── */
@keyframes fadeInPage{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
body{animation:fadeInPage .4s ease both}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .lesson-cards-grid{grid-template-columns:repeat(3,1fr)}
  .ctrl-center{display:none}
  .vol-wrap{display:none}
  .topbar-title{font-size:12px;max-width:180px}
}
@media(max-width:600px){
  .lesson-cards-grid{grid-template-columns:repeat(2,1fr)}
}
</style>

    <!-- RECOMMENDED -->

</div><!-- /layout -->

/* ── STATE ── */
var urlParams    = new URLSearchParams(location.search);
var courseId     = parseInt(urlParams.get('id') || '2', 10);
var startLesson  = parseInt(urlParams.get('lesson') || '0', 10);
var course       = COURSES[courseId] || COURSES[2];
var currentIdx   = startLesson;   // index into course.lessons[]

// Determine first unfinished lesson as default
if(startLesson === 0){
  var firstUnfinished = course.lessons.findIndex(function(l){return !l.done;});
  currentIdx = firstUnfinished >= 0 ? firstUnfinished : 0;
}

var ytPlayer, pollTimer, hideTimer;
var isPlaying   = false;
var playerReady = false;
var pendingPlay = false;
var upnextShown = false;
var upnextTimer = null;
var upnextCountdownTimer = null;
var upnextSecondsLeft = 15;
var descExpanded = false;
var currentSpeed = 1;
var isDragging = false;

/* ── RENDER PAGE ── */
function renderPage(){
  document.title = course.title + ' · Hoopis Performance Network';
  document.getElementById('topbarTitle').textContent = course.title;
  document.getElementById('ciTitle').textContent = course.title;
  document.getElementById('ciAvatar').textContent = course.xinit;
  document.getElementById('ciAvatar').style.background = 'linear-gradient(135deg,'+course.xcol+',#00c8d4)';
  document.getElementById('ciExpertName').textContent = course.expert;
  document.getElementById('ciExpertRole').textContent = course.xrole;
  document.getElementById('ciLessons').textContent = course.lessons.length;

  var prog = course.progress || 0;
  document.getElementById('ciProgPct').textContent = prog + '%';
  document.getElementById('ciProgFill').style.width = prog + '%';
  document.getElementById('progPillFill').style.width = prog + '%';
  document.getElementById('progPillPct').textContent = prog + '%';

  var fullDesc = course.desc;
  var shortDesc = fullDesc.length > 140 ? fullDesc.slice(0,140)+'…' : fullDesc;
  document.getElementById('ciDesc').textContent = shortDesc;
  if(fullDesc.length <= 140) document.getElementById('ciDescToggle').style.display = 'none';

  document.getElementById('ciTags').innerHTML = course.tags.map(function(t){
    return '<span class="ci-tag">'+t+'</span>';
  }).join('') + '<span class="ci-tag">'+course.dur+'</span>';

  document.getElementById('lessonCardsMeta').textContent = course.lessons.length+' lessons · '+course.dur;

  renderLessonCards();
}

function renderLessonCards(){
  var grid = document.getElementById('lessonCardsGrid');
  if(!grid) return;
  grid.innerHTML = '';
  course.lessons.forEach(function(lesson, idx){
    var card = document.createElement('div');
    var isActive = idx === currentIdx;
    var isDone = lesson.done;
    card.className = 'lc-card' + (isActive ? ' active' : '') + (isDone ? ' completed' : '');
    var num = String(idx + 1).padStart(2, '0');
    card.innerHTML =
      '<div class="lc-chap-num">' + num + '</div>' +
      '<div class="lc-title">' + lesson.title + '</div>' +
      '<div class="lc-footer">' +
        '<span class="lc-dur">' + lesson.dur + '</span>' +
        '<span class="lc-now-badge">▶ Now playing</span>' +
        '<span class="lc-done-badge">✓ Done</span>' +
      '</div>';
    card.addEventListener('click', function(){ loadLesson(idx); });
    grid.appendChild(card);
  });
}


/* ── LOAD LESSON ── */
function loadLesson(idx){
  currentIdx = idx;
  var lesson = course.lessons[idx];
  dismissUpNext();
  document.getElementById('lessonNameCtrl').textContent = lesson.title;
  if(ytPlayer && ytPlayer.loadVideoById){
    ytPlayer.loadVideoById(lesson.ytId);
    isPlaying = true;
    updatePlayIcon(true);
    hideBigPlay();
  }
  renderLessonCards();
}

function loadNextLesson(){
  var next = currentIdx + 1;
  if(next < course.lessons.length){
    course.lessons[currentIdx].done = true;
    loadLesson(next);
  }
}

/* ── YOUTUBE API ── */
function onYouTubeIframeAPIReady(){
  var lesson = course.lessons[currentIdx];
  ytPlayer = new YT.Player('yt-iframe', {
    videoId: lesson.ytId,
    playerVars:{
      controls:1, enablejsapi:1, modestbranding:1,
      rel:0, iv_load_policy:3, playsinline:1,
      origin: location.origin
    },
    events:{
      onReady: onPlayerReady,
      onStateChange: onPlayerStateChange
    }
  });
}

function onPlayerReady(e){
  playerReady = true;
  updateDuration(ytPlayer.getDuration());
  document.getElementById('lessonNameCtrl').textContent = course.lessons[currentIdx].title;
  if(pendingPlay){ pendingPlay = false; ytCmd('playVideo'); }
}

function onPlayerStateChange(e){
  var S = YT.PlayerState;
  if(e.data === S.PLAYING){
    isPlaying = true;
    updatePlayIcon(true);
    hideBigPlay();
    showSpinner(false);
    startPoll();
  } else if(e.data === S.PAUSED){
    isPlaying = false;
    updatePlayIcon(false);
    stopPoll();
  } else if(e.data === S.BUFFERING){
    showSpinner(true);
  } else if(e.data === S.ENDED){
    isPlaying = false;
    updatePlayIcon(false);
    stopPoll();
    course.lessons[currentIdx].done = true;
    loadNextLesson();
  }
  if(e.data !== S.BUFFERING) showSpinner(false);
}

function startPoll(){
  stopPoll();
  pollTimer = setInterval(function(){
    if(!ytPlayer || !ytPlayer.getCurrentTime) return;
    var cur = ytPlayer.getCurrentTime();
    var dur = ytPlayer.getDuration();
    if(!isDragging) updateProgressUI(cur, dur);
    checkUpNext(cur, dur);
    // buffered
    try{
      var buf = ytPlayer.getVideoLoadedFraction() * dur;
      document.getElementById('progressBuffered').style.width = (buf/dur*100)+'%';
    }catch(err){}
  }, 500);
}
function stopPoll(){ if(pollTimer) clearInterval(pollTimer); }

/* ── PROGRESS UI ── */
function updateProgressUI(cur, dur){
  if(!dur || dur === 0) return;
  var pct = (cur/dur)*100;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressThumb').style.left = pct+'%';
  document.getElementById('timeCurrent').textContent = fmtTime(cur);
  document.getElementById('timeDuration').textContent = fmtTime(dur);
}
function updateDuration(dur){
  document.getElementById('timeDuration').textContent = fmtTime(dur);
}
function fmtTime(s){
  s = Math.floor(s||0);
  var m = Math.floor(s/60), sec = s%60;
  return m+':'+(sec<10?'0':'')+sec;
}

/* ── CONTROLS AUTO-HIDE ── */
var controlsOverlay = document.getElementById('controlsOverlay');
function showControls(){
  controlsOverlay.classList.add('visible');
  clearTimeout(hideTimer);
  if(isPlaying){
    hideTimer = setTimeout(function(){
      if(isPlaying) controlsOverlay.classList.remove('visible');
    }, 3000);
  }
}
document.getElementById('playerContainer').addEventListener('mousemove', showControls);
document.getElementById('playerContainer').addEventListener('mouseleave', function(){
  if(isPlaying){
    controlsOverlay.classList.remove('visible');
    clearTimeout(hideTimer);
  }
});
document.getElementById('playerContainer').addEventListener('click', function(e){
  if(e.target === this || e.target.id === 'yt-iframe'){
    togglePlay();
    showControls();
  }
});

/* ── YOUTUBE COMMAND (dual: JS API + postMessage fallback) ── */
function ytCmd(fn){
  /* Primary: YT.Player API */
  if(ytPlayer && playerReady){ try{ ytPlayer[fn](); }catch(e){} }
  /* Fallback: postMessage directly to the iframe YouTube creates */
  var iframe = document.querySelector('#playerContainer iframe');
  if(iframe){
    try{
      iframe.contentWindow.postMessage(
        JSON.stringify({event:'command', func:fn, args:[]}), '*'
      );
    }catch(e){}
  }
}

/* Listen for YouTube state events via postMessage (backup to YT.Player events) */
window.addEventListener('message', function(e){
  if(!e.data) return;
  try{
    var d = (typeof e.data === 'string') ? JSON.parse(e.data) : e.data;
    if(d.event === 'onStateChange') onPlayerStateChange({data: d.info});
    if(d.event === 'onReady' && !playerReady){ playerReady = true; if(pendingPlay){ pendingPlay = false; ytCmd('playVideo'); } }
  }catch(ex){}
});

/* ── PLAY / PAUSE ── */
document.getElementById('btnPlay').addEventListener('click', function(e){
  e.stopPropagation(); togglePlay();
});
function togglePlay(){
  if(!isPlaying && !playerReady){ pendingPlay = true; }
  ytCmd(isPlaying ? 'pauseVideo' : 'playVideo');
}
function updatePlayIcon(playing){
  document.getElementById('iconPlay').innerHTML = playing
    ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
    : '<polygon points="5 3 19 12 5 21 5 3"/>';
}
function hideBigPlay(){ /* removed */ }
function showSpinner(show){ document.getElementById('spinner').classList.toggle('show', show); }

/* ── SKIP ── */
document.getElementById('btnBack10').addEventListener('click', function(e){
  e.stopPropagation();
  if(ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(Math.max(0, ytPlayer.getCurrentTime()-10), true);
});
document.getElementById('btnFwd10').addEventListener('click', function(e){

});

/* ── PROGRESS BAR SCRUB ── */
var track = document.getElementById('progressTrack');
track.addEventListener('mousedown', function(e){
  isDragging = true;
  scrub(e);
});
document.addEventListener('mousemove', function(e){
  if(isDragging) scrub(e);
});
document.addEventListener('mouseup', function(e){
  if(isDragging){
    isDragging = false;
    scrub(e);
    if(ytPlayer && ytPlayer.seekTo){
      var dur = ytPlayer.getDuration();
      var rect = track.getBoundingClientRect();
      var pct = Math.min(1, Math.max(0, (e.clientX - rect.left)/rect.width));
      ytPlayer.seekTo(pct * dur, true);
    }
  }
});
function scrub(e){
  var rect = track.getBoundingClientRect();
  var pct = Math.min(100, Math.max(0, (e.clientX - rect.left)/rect.width*100));
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressThumb').style.left = pct+'%';
}

/* ── VOLUME ── */
document.getElementById('btnMute').addEventListener('click', function(e){
  e.stopPropagation();
  if(!ytPlayer) return;
  if(ytPlayer.isMuted()){
    ytPlayer.unMute();
    document.getElementById('volSlider').value = ytPlayer.getVolume();
    updateVolIcon(ytPlayer.getVolume());
  } else {
    ytPlayer.mute();
    document.getElementById('volSlider').value = 0;
    updateVolIcon(0);
  }
});
document.getElementById('volSlider').addEventListener('input', function(e){
  e.stopPropagation();
  if(ytPlayer){
    ytPlayer.setVolume(parseInt(this.value));
    ytPlayer.unMute();
    updateVolIcon(parseInt(this.value));
  }
});
function updateVolIcon(vol){

    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>';
  } else if(vol < 50){
    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  } else {
    icon.innerHTML = '<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>';
  }
}

/* ── UP NEXT CARD ── */
function checkUpNext(cur, dur){
  if(!dur || upnextShown) return;
  var remaining = dur - cur;
  var nextIdx = currentIdx + 1;
  if(remaining <= 15 && remaining > 0 && nextIdx < course.lessons.length){
    showUpNext(nextIdx, remaining);
  }
}
function showUpNext(nextIdx, remaining){
  upnextShown = true;
  var next = course.lessons[nextIdx];
  var card = document.getElementById('upnextCard');
  document.getElementById('upnextTitle').textContent = next.title;
  document.getElementById('upnextDur').textContent = next.dur;
  document.getElementById('upnextThumb').src = imgUrl(course.id, 480, 270);
  upnextSecondsLeft = Math.ceil(remaining);
  document.getElementById('upnextCountdown').textContent = upnextSecondsLeft+'s';
  document.getElementById('upnextFill').style.width = '0%';

  card.classList.add('show');

  // countdown
  upnextCountdownTimer = setInterval(function(){
    upnextSecondsLeft--;
    document.getElementById('upnextCountdown').textContent = Math.max(0,upnextSecondsLeft)+'s';
    var pct = ((15 - upnextSecondsLeft)/15)*100;
    document.getElementById('upnextFill').style.width = pct+'%';
    if(upnextSecondsLeft <= 0){
      clearInterval(upnextCountdownTimer);
      loadLesson(nextIdx);
    }
  }, 1000);

  document.getElementById('upnextPlay').onclick = function(){ loadLesson(nextIdx); };
}
function dismissUpNext(){
  upnextShown = false;
  clearInterval(upnextCountdownTimer);
  document.getElementById('upnextCard').classList.remove('show');
}
document.getElementById('upnextDismiss').addEventListener('click', function(e){
  e.stopPropagation(); dismissUpNext();
});

  this.textContent = descExpanded ? 'Show less ↑' : 'Show more ↓';
});

    if(confirm('Leave course? Your progress has been saved.')){
      window.location.href = 'index.html';
    }
  }
});

/* ── TOP BAR SCROLL ── */
window.addEventListener('scroll', function(){
  document.getElementById('topbar').classList.toggle('solid', window.scrollY > 20);
}, {passive:true});

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', function(e){
  if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if(e.code === 'Space'){ e.preventDefault(); togglePlay(); }
  if(e.code === 'ArrowRight'){ if(ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(ytPlayer.getCurrentTime()+10,true); }
  if(e.code === 'ArrowLeft'){ if(ytPlayer && ytPlayer.seekTo) ytPlayer.seekTo(Math.max(0,ytPlayer.getCurrentTime()-10),true); }
  if(e.code === 'KeyF'){ document.getElementById('btnFullscreen').click(); }
  if(e.code === 'KeyM'){ document.getElementById('btnMute').click(); }
});

/* ── INIT ── */
renderPage();
</script>
</body>
</html>
